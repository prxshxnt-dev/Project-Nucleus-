    <ellipse cx="48" cy="48" rx="44" ry="18" fill="none" stroke="url(#gold-glow)" stroke-width="2.5" stroke-dasharray="6 3" transform="rotate(-30, 48, 48)" opacity="0.6"/>
    <ellipse cx="48" cy="48" rx="44" ry="18" fill="none" stroke="url(#gold-glow)" stroke-width="2" transform="rotate(45, 48, 48)" opacity="0.4"/>
    
