<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <radialGradient id="gold-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF3D4"/>
      <stop offset="60%" stop-color="#E5D2A5"/>
      <stop offset="100%" stop-color="#b59f6d"/>
    </radialGradient>
    <linearGradient id="shield-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2D2D35" />
      <stop offset="100%" stop-color="#121215" />
    </linearGradient>
  </defs>
  <!-- Background Shield Grid -->
  <rect width="192" height="192" fill="#070709" rx="40"/>
  <rect x="8" y="8" width="176" height="176" fill="url(#shield-grad)" rx="36" stroke="#E5D2A5" stroke-width="2" stroke-opacity="0.2"/>
  
  <g transform="translate(48, 48)">
